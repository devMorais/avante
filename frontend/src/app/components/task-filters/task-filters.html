<div class="filters-root">

  <!-- Barra principal -->
  <div class="filters-bar">

    <!-- Busca por texto -->
    <div class="search-box">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8" />
        <path d="m21 21-4.35-4.35" />
      </svg>
      <input type="text" class="search-input" placeholder="Buscar atividade..." [value]="search()"
        (input)="onSearchInput($any($event.target).value)" />
      <button *ngIf="search()" class="search-clear" (click)="onSearchInput('')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round">
          <path d="M18 6 6 18M6 6l12 12" />
        </svg>
      </button>
    </div>

    <div class="divider"></div>

    <!-- Dropdown Status -->
    <div class="dropdown-wrap">
      <button class="filter-btn" [class.active]="selectedStatusIds().length > 0"
        (click)="toggleDropdown('status'); $event.stopPropagation()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" />
          <path d="M12 8v4l3 3" />
        </svg>
        Status
        <span *ngIf="selectedStatusIds().length > 0" class="filter-count">{{ selectedStatusIds().length }}</span>
        <svg class="chevron" [class.open]="openDropdown() === 'status'" width="12" height="12" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="m6 9 6 6 6-6" />
        </svg>
      </button>

      <div *ngIf="openDropdown() === 'status'" class="dropdown-panel" (click)="$event.stopPropagation()">
        <span class="dropdown-panel-arrow"></span>
        <div class="dropdown-search-box">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
          <input type="text" placeholder="Buscar status..." [value]="statusSearch()"
            (input)="statusSearch.set($any($event.target).value)" />
        </div>
        <div class="dropdown-list">
          <button *ngFor="let s of filteredStatuses()" class="dropdown-item" [class.checked]="isStatusSelected(s.id)"
            (click)="toggleStatus(s.id)">
            <span class="checkbox" [class.checked]="isStatusSelected(s.id)">
              <svg *ngIf="isStatusSelected(s.id)" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white"
                stroke-width="3" stroke-linecap="round">
                <path d="M20 6 9 17l-5-5" />
              </svg>
            </span>
            <span class="status-dot" [style.background]="s.color || '#6B6B70'"></span>
            {{ s.name }}
          </button>
          <p *ngIf="filteredStatuses().length === 0" class="dropdown-empty">Nenhum status encontrado.</p>
        </div>
      </div>
    </div>

    <!-- Dropdown Prioridade -->
    <div class="dropdown-wrap">
      <button class="filter-btn" [class.active]="selectedPriorities().length > 0"
        (click)="toggleDropdown('priority'); $event.stopPropagation()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z" />
          <line x1="4" x2="4" y1="22" y2="15" />
        </svg>
        Prioridade
        <span *ngIf="selectedPriorities().length > 0" class="filter-count">{{ selectedPriorities().length }}</span>
        <svg class="chevron" [class.open]="openDropdown() === 'priority'" width="12" height="12" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="m6 9 6 6 6-6" />
        </svg>
      </button>

      <div *ngIf="openDropdown() === 'priority'" class="dropdown-panel" (click)="$event.stopPropagation()">
        <span class="dropdown-panel-arrow"></span>
        <div class="dropdown-list">
          <button *ngFor="let p of priorities" class="dropdown-item" [class.checked]="isPrioritySelected(p.name)"
            (click)="togglePriority(p.name)">
            <span class="checkbox" [class.checked]="isPrioritySelected(p.name)">
              <svg *ngIf="isPrioritySelected(p.name)" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white"
                stroke-width="3" stroke-linecap="round">
                <path d="M20 6 9 17l-5-5" />
              </svg>
            </span>
            <span class="priority-dot" [style.background]="p.color"></span>
            <span [style.color]="p.color" style="font-weight: 600;">{{ p.name }}</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Dropdown Responsável -->
    <div class="dropdown-wrap">
      <button class="filter-btn" [class.active]="selectedAssigneeIds().length > 0"
        (click)="toggleDropdown('assignee'); $event.stopPropagation()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
        Responsável
        <span *ngIf="selectedAssigneeIds().length > 0" class="filter-count">{{ selectedAssigneeIds().length }}</span>
        <svg class="chevron" [class.open]="openDropdown() === 'assignee'" width="12" height="12" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="m6 9 6 6 6-6" />
        </svg>
      </button>

      <div *ngIf="openDropdown() === 'assignee'" class="dropdown-panel" (click)="$event.stopPropagation()">
        <span class="dropdown-panel-arrow"></span>
        <div class="dropdown-search-box">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
          <input type="text" placeholder="Buscar responsável..." [value]="assigneeSearch()"
            (input)="assigneeSearch.set($any($event.target).value)" />
        </div>
        <div class="dropdown-list">
          <button *ngFor="let u of filteredUsers()" class="dropdown-item" [class.checked]="isAssigneeSelected(u.id)"
            (click)="toggleAssignee(u.id)">
            <span class="checkbox" [class.checked]="isAssigneeSelected(u.id)">
              <svg *ngIf="isAssigneeSelected(u.id)" width="10" height="10" viewBox="0 0 24 24" fill="none"
                stroke="white" stroke-width="3" stroke-linecap="round">
                <path d="M20 6 9 17l-5-5" />
              </svg>
            </span>
            <span class="user-avatar">{{ initialsFor(u.name) }}</span>
            {{ u.name }}
          </button>
          <p *ngIf="filteredUsers().length === 0" class="dropdown-empty">Nenhum usuário encontrado.</p>
        </div>
      </div>
    </div>

    <!-- Dropdown Épico -->
    <div class="dropdown-wrap" *ngIf="epics.length > 0">
      <button class="filter-btn" [class.active]="selectedEpics().length > 0"
        (click)="toggleDropdown('epic'); $event.stopPropagation()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
        </svg>
        Épico
        <span *ngIf="selectedEpics().length > 0" class="filter-count">{{ selectedEpics().length }}</span>
        <svg class="chevron" [class.open]="openDropdown() === 'epic'" width="12" height="12" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="m6 9 6 6 6-6" />
        </svg>
      </button>

      <div *ngIf="openDropdown() === 'epic'" class="dropdown-panel" (click)="$event.stopPropagation()">
        <span class="dropdown-panel-arrow"></span>
        <div class="dropdown-search-box" *ngIf="epics.length > 5">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
          <input type="text" placeholder="Buscar épico..." [value]="epicSearch()"
            (input)="epicSearch.set($any($event.target).value)" />
        </div>
        <div class="dropdown-list">
          <button *ngFor="let e of filteredEpics()" class="dropdown-item" [class.checked]="isEpicSelected(e)"
            (click)="toggleEpic(e)">
            <span class="checkbox" [class.checked]="isEpicSelected(e)">
              <svg *ngIf="isEpicSelected(e)" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white"
                stroke-width="3" stroke-linecap="round">
                <path d="M20 6 9 17l-5-5" />
              </svg>
            </span>
            <span class="epic-dot"></span>
            {{ e }}
          </button>
          <p *ngIf="filteredEpics().length === 0" class="dropdown-empty">Nenhum épico encontrado.</p>
        </div>
      </div>
    </div>

    <!-- Dropdown Tags -->
    <div class="dropdown-wrap" *ngIf="tags.length > 0">
      <button class="filter-btn" [class.active]="selectedTagIds().length > 0"
        (click)="toggleDropdown('tag'); $event.stopPropagation()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round">
          <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
          <line x1="7" y1="7" x2="7.01" y2="7"/>
        </svg>
        Tags
        <span *ngIf="selectedTagIds().length > 0" class="filter-count">{{ selectedTagIds().length }}</span>
        <svg class="chevron" [class.open]="openDropdown() === 'tag'" width="12" height="12" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <polyline points="6 9 12 15 18 9" />
        </svg>
      </button>
      <div *ngIf="openDropdown() === 'tag'" class="dropdown-panel" (click)="$event.stopPropagation()">
        <span class="dropdown-panel-arrow"></span>
        <div class="dropdown-search-box" *ngIf="tags.length > 5">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round">
            <circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input type="text" placeholder="Buscar tag..." [value]="tagSearch()"
            (input)="tagSearch.set($any($event.target).value)" />
        </div>
        <div class="dropdown-list">
          <button *ngFor="let t of filteredTags()" class="dropdown-item" [class.checked]="isTagSelected(t.id)"
            (click)="toggleTag(t.id)">
            <span class="checkbox" [class.checked]="isTagSelected(t.id)">
              <svg *ngIf="isTagSelected(t.id)" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white"
                stroke-width="3.5" stroke-linecap="round"><path d="M20 6 9 17l-5-5" /></svg>
            </span>
            <span class="tag-filter-dot" [style.background]="t.color"></span>
            {{ t.name }}
          </button>
          <p *ngIf="filteredTags().length === 0" class="dropdown-empty">Nenhuma tag encontrada.</p>
        </div>
      </div>
    </div>

    <!-- Limpar filtros -->
    <button *ngIf="hasActiveFilters()" class="clear-btn" (click)="clearAll()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round">
        <path d="M18 6 6 18M6 6l12 12" />
      </svg>
      Limpar
    </button>

  </div>

  <!-- Chips de filtros ativos -->
  <div *ngIf="activeChips().length > 0" class="active-chips">
    <span class="chips-label">Filtros ativos:</span>
    <span *ngFor="let chip of activeChips()" class="chip" [class.chip-status]="chip.type === 'status'"
      [class.chip-priority]="chip.type === 'priority'" [class.chip-assignee]="chip.type === 'assignee'"
      [class.chip-epic]="chip.type === 'epic'" [class.chip-tag]="chip.type === 'tag'"
      [style.background]="chip.type === 'tag' && chip.color ? chip.color + '20' : null"
      [style.color]="chip.type === 'tag' && chip.color ? chip.color : null"
      [style.border-color]="chip.type === 'tag' && chip.color ? chip.color + '50' : null">
      {{ chip.label }}
      <button class="chip-remove" (click)="removeChip(chip)">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
          stroke-linecap="round">
          <path d="M18 6 6 18M6 6l12 12" />
        </svg>
      </button>
    </span>
  </div>

</div>
