<div class="filters-root">

  <!-- Barra principal -->
  <div class="filters-bar">

    <!-- Busca por texto -->
    <div class="search-box">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8" />
        <path d="m21 21-4.35-4.35" />
      </svg>
      <input type="text" class="search-input" placeholder="Buscar atividade..." [value]="search()"
        (input)="onSearchInput($any($event.target).value)" />
      <button *ngIf="search()" class="search-clear" (click)="onSearchInput('')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round">
          <path d="M18 6 6 18M6 6l12 12" />
        </svg>
      </button>
    </div>

    <div class="divider"></div>

    <!-- Dropdown Status -->
    <div class="dropdown-wrap">
      <button class="filter-btn" [class.active]="selectedStatusIds().length > 0"
        (click)="toggleDropdown('status'); $event.stopPropagation()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" />
          <path d="M12 8v4l3 3" />
        </svg>
        Status
        <span *ngIf="selectedStatusIds().length > 0" class="filter-count">{{ selectedStatusIds().length }}</span>
        <svg class="chevron" [class.open]="openDropdown() === 'status'" width="12" height="12" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="m6 9 6 6 6-6" />
        </svg>
      </button>

      <div *ngIf="openDropdown() === 'status'" class="dropdown-panel" (click)="$event.stopPropagation()">
        <div class="dropdown-search-box">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
          <input type="text" placeholder="Buscar status..." [value]="statusSearch()"
            (input)="statusSearch.set($any($event.target).value)" />
        </div>
        <div class="dropdown-list">
          <button *ngFor="let s of filteredStatuses()" class="dropdown-item" [class.checked]="isStatusSelected(s.id)"
            (click)="toggleStatus(s.id)">
            <span class="checkbox" [class.checked]="isStatusSelected(s.id)">
              <svg *ngIf="isStatusSelected(s.id)" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white"
                stroke-width="3" stroke-linecap="round">
                <path d="M20 6 9 17l-5-5" />
              </svg>
            </span>
            <span class="status-dot" [style.background]="s.color || '#6B6B70'"></span>
            {{ s.name }}
          </button>
          <p *ngIf="filteredStatuses().length === 0" class="dropdown-empty">Nenhum status encontrado.</p>
        </div>
      </div>
    </div>

    <!-- Dropdown Prioridade -->
    <div class="dropdown-wrap">
      <button class="filter-btn" [class.active]="selectedPriorities().length > 0"
        (click)="toggleDropdown('priority'); $event.stopPropagation()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z" />
          <line x1="4" x2="4" y1="22" y2="15" />
        </svg>
        Prioridade
        <span *ngIf="selectedPriorities().length > 0" class="filter-count">{{ selectedPriorities().length }}</span>
        <svg class="chevron" [class.open]="openDropdown() === 'priority'" width="12" height="12" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="m6 9 6 6 6-6" />
        </svg>
      </button>

      <div *ngIf="openDropdown() === 'priority'" class="dropdown-panel" (click)="$event.stopPropagation()">
        <div class="dropdown-list">
          <button *ngFor="let p of priorities" class="dropdown-item" [class.checked]="isPrioritySelected(p)"
            (click)="togglePriority(p)">
            <span class="checkbox" [class.checked]="isPrioritySelected(p)">
              <svg *ngIf="isPrioritySelected(p)" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white"
                stroke-width="3" stroke-linecap="round">
                <path d="M20 6 9 17l-5-5" />
              </svg>
            </span>
            <span class="priority-dot" [style.background]="priorityColors[p]"></span>
            <span [style.color]="priorityColors[p]" style="font-weight: 600;">{{ p }}</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Dropdown Responsável -->
    <div class="dropdown-wrap">
      <button class="filter-btn" [class.active]="selectedAssigneeIds().length > 0"
        (click)="toggleDropdown('assignee'); $event.stopPropagation()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
        Responsável
        <span *ngIf="selectedAssigneeIds().length > 0" class="filter-count">{{ selectedAssigneeIds().length }}</span>
        <svg class="chevron" [class.open]="openDropdown() === 'assignee'" width="12" height="12" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="m6 9 6 6 6-6" />
        </svg>
      </button>

      <div *ngIf="openDropdown() === 'assignee'" class="dropdown-panel" (click)="$event.stopPropagation()">
        <div class="dropdown-search-box">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
          <input type="text" placeholder="Buscar responsável..." [value]="assigneeSearch()"
            (input)="assigneeSearch.set($any($event.target).value)" />
        </div>
        <div class="dropdown-list">
          <button *ngFor="let u of filteredUsers()" class="dropdown-item" [class.checked]="isAssigneeSelected(u.id)"
            (click)="toggleAssignee(u.id)">
            <span class="checkbox" [class.checked]="isAssigneeSelected(u.id)">
              <svg *ngIf="isAssigneeSelected(u.id)" width="10" height="10" viewBox="0 0 24 24" fill="none"
                stroke="white" stroke-width="3" stroke-linecap="round">
                <path d="M20 6 9 17l-5-5" />
              </svg>
            </span>
            <span class="user-avatar">{{ initialsFor(u.name) }}</span>
            {{ u.name }}
          </button>
          <p *ngIf="filteredUsers().length === 0" class="dropdown-empty">Nenhum usuário encontrado.</p>
        </div>
      </div>
    </div>

    <!-- Limpar filtros -->
    <button *ngIf="hasActiveFilters()" class="clear-btn" (click)="clearAll()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round">
        <path d="M18 6 6 18M6 6l12 12" />
      </svg>
      Limpar
    </button>

  </div>

  <!-- Chips de filtros ativos -->
  <div *ngIf="activeChips().length > 0" class="active-chips">
    <span class="chips-label">Filtros ativos:</span>
    <span *ngFor="let chip of activeChips()" class="chip" [class.chip-status]="chip.type === 'status'"
      [class.chip-priority]="chip.type === 'priority'" [class.chip-assignee]="chip.type === 'assignee'">
      {{ chip.label }}
      <button class="chip-remove" (click)="removeChip(chip)">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
          stroke-linecap="round">
          <path d="M18 6 6 18M6 6l12 12" />
        </svg>
      </button>
    </span>
  </div>

</div>
