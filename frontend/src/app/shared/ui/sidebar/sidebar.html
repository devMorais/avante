<aside class="sidebar" [class.collapsed]="collapsed">
  <div class="sidebar-topbar">
    <button class="sidebar-toggle" (click)="onToggle()" aria-label="Abrir/fechar menu">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>

    <button class="sidebar-bell" (click)="onBellClick($event)" aria-label="Notificações">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9" />
        <path d="M13.73 21a2 2 0 0 1-3.46 0" />
      </svg>
      <span class="sidebar-bell-badge" *ngIf="notifications.unreadCount() > 0">
        {{ notifications.unreadCount() > 9 ? '9+' : notifications.unreadCount() }}
      </span>
    </button>
  </div>

  <nav class="sidebar-nav">
    <ng-content></ng-content>
  </nav>

  <div class="sidebar-footer">
    <button class="sidebar-theme-toggle" (click)="toggleTheme()"
      [title]="theme.isDark() ? 'Mudar para modo claro' : 'Mudar para modo escuro'">
      <svg *ngIf="!theme.isDark()" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4" />
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" />
      </svg>
      <svg *ngIf="theme.isDark()" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
      </svg>
      <span *ngIf="!collapsed">{{ theme.isDark() ? 'Modo escuro' : 'Modo claro' }}</span>
    </button>

    <button class="sidebar-user" *ngIf="auth.currentUser() as user" (click)="goToProfile()" title="Editar perfil">
      <span class="sidebar-user-avatar">
        <img *ngIf="user.avatar_url" [src]="user.avatar_url" [alt]="user.name" class="sidebar-avatar-img" />
        <span *ngIf="!user.avatar_url">{{ initialsFor(user.name) }}</span>
      </span>
      <span class="sidebar-user-info" *ngIf="!collapsed">
        <span class="sidebar-user-name">{{ user.name }}</span>
        <span class="sidebar-user-email">{{ user.email }}</span>
      </span>
    </button>

    <button class="sidebar-logout-btn" (click)="logout()" title="Sair">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
      <span *ngIf="!collapsed">Sair</span>
    </button>
  </div>
</aside>

<div class="notif-panel" *ngIf="notifOpen()" [class.collapsed]="collapsed" (click)="$event.stopPropagation()">
  <span class="notif-panel-arrow"></span>
  <div class="notif-panel-head">
    <span>Notificações</span>
    <button *ngIf="notifications.unreadCount() > 0" class="notif-mark-all" (click)="notifications.markAllRead()">
      Marcar todas como lidas
    </button>
  </div>
  <div class="notif-panel-list">
    <button *ngFor="let n of notifications.items()" class="notif-item" [class.unread]="!n.read_at"
      (click)="openNotification(n)">
      <app-avatar [name]="n.from_user?.name || '?'" [photoUrl]="n.from_user?.avatar_url" size="sm"></app-avatar>
      <div class="notif-item-body">
        <span class="notif-item-msg">{{ n.message }}</span>
        <span class="notif-item-time">{{ n.created_at | date:'dd/MM HH:mm' }}</span>
      </div>
      <span *ngIf="!n.read_at" class="notif-dot"></span>
    </button>
    <p *ngIf="notifications.items().length === 0" class="notif-empty">Nenhuma notificação ainda.</p>
  </div>
</div>
