<aside class="sidebar" [class.collapsed]="collapsed">
  <button class="sidebar-toggle" (click)="onToggle()" aria-label="Abrir/fechar menu">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round">
      <line x1="3" y1="6" x2="21" y2="6"></line>
      <line x1="3" y1="12" x2="21" y2="12"></line>
      <line x1="3" y1="18" x2="21" y2="18"></line>
    </svg>
  </button>

  <nav class="sidebar-nav">
    <ng-content></ng-content>
  </nav>

  <div class="sidebar-footer">
    <button class="sidebar-user" *ngIf="auth.currentUser() as user" (click)="goToProfile()" title="Editar perfil">
      <span class="sidebar-user-avatar">
        <img *ngIf="user.avatar_url" [src]="user.avatar_url" [alt]="user.name" class="sidebar-avatar-img" />
        <span *ngIf="!user.avatar_url">{{ initialsFor(user.name) }}</span>
      </span>
      <span class="sidebar-user-info" *ngIf="!collapsed">
        <span class="sidebar-user-name">{{ user.name }}</span>
        <span class="sidebar-user-email">{{ user.email }}</span>
      </span>
    </button>

    <button class="sidebar-logout-btn" (click)="logout()" title="Sair">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
      <span *ngIf="!collapsed">Sair</span>
    </button>
  </div>
</aside>
