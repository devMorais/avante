<div class="pagination-bar" *ngIf="lastPage > 0">

  <span class="pagination-info">
    Mostrando <strong>{{ from }}–{{ to }}</strong> de <strong>{{ total }}</strong> atividades
  </span>

  <div class="pagination-controls">
    <button class="page-btn nav-btn" [class.disabled]="currentPage === 1" (click)="prev()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round">
        <path d="m15 18-6-6 6-6" />
      </svg>
    </button>

    <ng-container *ngFor="let p of pages">
      <button *ngIf="isNumber(p)" class="page-btn" [class.active]="p === currentPage" (click)="goTo(p)">{{ p }}</button>
      <span *ngIf="!isNumber(p)" class="page-dots">...</span>
    </ng-container>

    <button class="page-btn nav-btn" [class.disabled]="currentPage === lastPage" (click)="next()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round">
        <path d="m9 18 6-6-6-6" />
      </svg>
    </button>
  </div>

  <div class="per-page-wrap">
    <span class="per-page-label">Por página:</span>
    <select class="per-page-select" [value]="perPage" (change)="onPerPageChange($any($event.target).value)">
      <option *ngFor="let opt of perPageOptions" [value]="opt">{{ opt }}</option>
    </select>
  </div>

</div>
